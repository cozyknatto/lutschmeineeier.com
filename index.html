<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozy</title>
    <meta name="description" content="Cozy" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
        <div class="cursor" id="cursor"><div class="cursor-center"></div></div>
    <div class="mouse-glow" id="mouse-glow"></div>
    <div class="toast" id="toast">Copied!</div>
    <div class="wrap">
      <section class="hero">
        <div class="avatar" data-a id="s-initial"></div>
        <h1 class="name" data-a id="s-name"></h1>
        <p class="bio" data-a id="s-bio"></p>
        <div class="socials" data-a id="s-socials"></div>
      </section>

      <div class="dc" id="dc">
        <div class="dc-left">
          <div class="dc-avwrap">
            <img class="dc-av" id="dc-av" src="" alt="avatar" />
            <span class="dc-dot offline" id="dc-dot"></span>
          </div>
          <div class="dc-info">
            <div class="dc-nameline">
              <span class="dc-name" id="dc-name"></span>
            </div>
            <div class="dc-sub">
              <span class="dc-handle" id="dc-handle"></span>
            </div>
          </div>
        </div>
        <span class="dc-clan" id="dc-clan">
          <img class="dc-clan-badge" id="dc-clan-badge" src="" alt="" />
          <span id="dc-clan-tag"></span>
        </span>
      </div>

      <div class="dc-activity-bar" id="dc-activity-bar">
        <div id="dc-activity"></div>
      </div>

      <p class="section-title" data-a>projects</p>
      <div class="grid" id="s-grid"></div>
      <footer data-a id="s-footer"></footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/render.js"></script>
    <script src="js/lanyard.js"></script>
    <script src="js/main.js"></script>
  </body>


</html>
